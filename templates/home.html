<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMJ Rice Retailing POS</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', Arial, sans-serif;
            background: linear-gradient(135deg, #232a34 0%, #4f8cff 100%);
            margin: 0;
            padding: 0;
            transition: background 0.6s;
        }
        .container {
            max-width: 400px;
            margin: 60px auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            padding: 32px 24px 24px 24px;
            text-align: center;
        }
        h1 {
            color: #2d3a4b;
            margin-bottom: 32px;
            font-size: 2rem;
            font-weight: 700;
        }
        .menu-btn {
            display: block;
            width: 100%;
            margin: 12px 0;
            padding: 14px 0;
            background: #4f8cff;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .menu-btn:hover {
            background: #2563eb;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>LMJ Rice Retailing POS</h1>
        <a href="/suppliers"><button class="menu-btn">Suppliers</button></a>
        <a href="/inventory"><button class="menu-btn">Inventory</button></a>
        <a href="/sales"><button class="menu-btn">Sales</button></a>
    </div>
</body>
</html>

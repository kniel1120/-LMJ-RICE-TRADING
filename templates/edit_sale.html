<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Sale - LMJ POS</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', Arial, sans-serif; background: #f8fafc; }
        .edit-container { max-width: 400px; margin: 60px auto; background: #fff; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 32px 24px; }
        h2 { color: #2d3a4b; margin-bottom: 18px; text-align:center; }
        .menu-btn { background: #4f8cff; color: #fff; border: none; border-radius: 6px; padding: 10px 24px; font-size: 1.1rem; font-weight: 500; cursor: pointer; margin-top: 12px; width:100%; }
        .menu-btn:hover { background: #2563eb; }
        input[type="number"] { padding: 8px; border-radius: 4px; border: 1px solid #ddd; width: 100%; margin-bottom: 12px; }
    </style>
</head>
<body>
    <div class="edit-container">
        <h2>Edit Sale</h2>
        <form method="post">
            <label for="sale_type">Sale Type</label>
            <select id="sale_type" name="sale_type" required onchange="updateEditSaleType()">
                <option value="kilo" {% if sale['sale_type'] == 'kilo' or not sale['sale_type'] %}selected{% endif %}>Per Kilo</option>
                <option value="sack" {% if sale['sale_type'] == 'sack' %}selected{% endif %}>Per Sack</option>
            </select>
            <div id="edit_kilo_div" style="margin-top:10px;">
                <label for="quantity">Quantity (kg)</label>
                <input type="number" id="quantity" name="quantity" min="0.01" step="0.01" value="{{ sale['quantity'] if sale['sale_type'] != 'sack' else '' }}">
            </div>
            <div id="edit_sack_div" style="margin-top:10px;display:none;">
                <label for="sack_qty">Quantity (sack)</label>
                <input type="number" id="sack_qty" name="sack_qty" min="1" step="1" value="{% if sale['sale_type'] == 'sack' and sale['sack_size'] %}{{ (sale['quantity'] // sale['sack_size'])|int }}{% endif %}">
                <div style="font-size:0.98rem;color:#555;margin-top:4px;">
                    Sack Size: <b>{{ sale['sack_size'] if sale['sack_size'] else '-' }}</b> | Sack Price: <b>₱{{ sale['sack_price']|float|round(2) if sale['sack_price'] else '-' }}</b>
                </div>
            </div>
            <label for="total">Total (₱)</label>
            <input type="number" id="total" name="total" min="0.01" step="0.01" value="{{ sale['total'] }}" required>
            <button type="submit" class="menu-btn">Save Changes</button>
        </form>
        <script>
        function updateEditSaleType() {
            var type = document.getElementById('sale_type').value;
            document.getElementById('edit_kilo_div').style.display = (type === 'kilo') ? '' : 'none';
            document.getElementById('edit_sack_div').style.display = (type === 'sack') ? '' : 'none';
        }
        updateEditSaleType();
        </script>
        <div style="margin-top:18px;text-align:center;">
            <a href="/sales" class="menu-btn" style="background:#888;">Cancel</a>
        </div>
    </div>
</body>
</html>

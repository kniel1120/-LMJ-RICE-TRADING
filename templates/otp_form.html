<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OTP Verification - LMJ POS</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', Arial, sans-serif; background: #f8fafc; }
        .otp-container { max-width: 350px; margin: 60px auto; background: #fff; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 32px 24px; text-align:center; }
        h2 { color: #2d3a4b; margin-bottom: 18px; }
        .menu-btn { background: #4f8cff; color: #fff; border: none; border-radius: 6px; padding: 10px 24px; font-size: 1.1rem; font-weight: 500; cursor: pointer; margin-top: 12px; }
        .menu-btn:hover { background: #2563eb; }
        input[type="text"] { padding: 8px; border-radius: 4px; border: 1px solid #ddd; width: 80%; margin-bottom: 12px; }
    </style>
</head>
<body>
    <div class="otp-container">
        <h2>OTP Verification</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div style="color:red;">{{ message }}</div>
            {% endfor %}
        {% endwith %}
        {% if show_send %}
            <form method="post" action="?send_otp=1">
                <button type="submit" class="menu-btn">Send OTP</button>
            </form>
        {% else %}
            <form method="post">
                <label for="otp_input">Enter OTP sent to your phone:</label><br>
                <input type="text" id="otp_input" name="otp_input" maxlength="6" required><br>
                <button type="submit" class="menu-btn">Verify OTP</button>
            </form>
        {% endif %}
        <div style="margin-top:18px;">
            <a href="{{ '/sales' if is_sale else '/financial' }}" class="menu-btn" style="background:#888;">Cancel</a>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMJ Rice Trading POS (Static Demo)</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', Arial, sans-serif; background: linear-gradient(135deg, #232a34 0%, #4f8cff 100%); margin: 0; }
        .container { max-width: 700px; margin: 40px auto; background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 32px 24px; }
        h1 { color: #2d3a4b; margin-bottom: 32px; font-size: 2rem; font-weight: 700; text-align:center; }
        .menu-btn { display: inline-block; margin: 0 8px 16px 0; padding: 12px 24px; background: #4f8cff; color: #fff; border: none; border-radius: 6px; font-size: 1.1rem; font-weight: 500; cursor: pointer; text-decoration: none; transition: background 0.2s; }
        .menu-btn:hover { background: #2563eb; }
        .inventory-grid { display: flex; flex-wrap: wrap; gap: 22px 22px; justify-content: flex-start; margin-bottom: 18px; }
        .inventory-card { background: #f8fafc; border-radius: 12px; box-shadow: 0 2px 8px rgba(79,140,255,0.07), 0 2px 8px rgba(0,0,0,0.03); padding: 14px 18px; min-width: 150px; flex: 1 0 150px; max-width: 170px; margin: 0 auto; transition: box-shadow 0.18s, transform 0.18s; position: relative; overflow: hidden; }
        .inventory-card .rice-title { font-size: 1.05rem; font-weight: 700; color: #2d3a4b; margin-bottom: 5px; letter-spacing: 0.5px; }
        .inventory-card .rice-price { color: #2563eb; font-size: 1.08rem; font-weight: 700; margin-bottom: 6px; }
        .inventory-card .rice-stock { margin-top: 2px; color: #256029; font-weight: 500; font-size: 0.97rem; }
        @media (max-width: 900px) { .container { max-width: 98vw; padding: 18px 6vw; } .inventory-grid { gap: 12px 12px; } .inventory-card { min-width: 120px; max-width: 140px; padding: 10px 8px; } }
        @media (max-width: 600px) { .container { max-width: 100vw; padding: 8px 2vw; } h1 { font-size: 1.2rem; } .inventory-grid { flex-direction: column; gap: 8px 0; } .inventory-card { min-width: 90vw; max-width: 98vw; margin-bottom: 8px; } .menu-btn { font-size: 1rem; padding: 10px 12px; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>LMJ Rice Trading POS (Static Demo)</h1>
        <div style="display: flex; justify-content: center; gap: 12px; margin-bottom: 24px;">
            <a href="#" class="menu-btn">Suppliers</a>
            <a href="#" class="menu-btn">Inventory</a>
            <a href="#" class="menu-btn">Sales</a>
            <a href="#" class="menu-btn">Financial Statement</a>
        </div>
        <h2>Rice Inventory (Sample)</h2>
        <div class="inventory-grid">
            <div class="inventory-card">
                <div class="rice-title">Dinorado</div>
                <div class="rice-price">₱52.00 <span style="font-size:0.98rem;font-weight:400;">/ kg</span></div>
                <div class="rice-stock">Stock: 120 kg</div>
            </div>
            <div class="inventory-card">
                <div class="rice-title">Jasmine</div>
                <div class="rice-price">₱48.00 <span style="font-size:0.98rem;font-weight:400;">/ kg</span></div>
                <div class="rice-stock">Stock: 80 kg</div>
            </div>
            <div class="inventory-card">
                <div class="rice-title">Sinandomeng</div>
                <div class="rice-price">₱45.00 <span style="font-size:0.98rem;font-weight:400;">/ kg</span></div>
                <div class="rice-stock">Stock: 60 kg</div>
            </div>
        </div>
        <h2 style="margin-top:36px;">Process Sale (Demo Only)</h2>
        <form style="background:#f8fafc;border-radius:8px;padding:18px 16px;max-width:400px;margin:0 auto 24px auto;box-shadow:0 2px 8px rgba(0,0,0,0.03);">
            <div style="margin-bottom:14px;">
                <label for="rice_type" style="font-weight:500;">Rice Type</label>
                <select id="rice_type" name="rice_type" required style="width:100%;padding:8px;border-radius:4px;border:1px solid #ddd;" onchange="updatePrice()">
                    <option value="">Select rice type</option>
                    <option value="Dinorado" data-price="52">Dinorado</option>
                    <option value="Jasmine" data-price="48">Jasmine</option>
                    <option value="Sinandomeng" data-price="45">Sinandomeng</option>
                </select>
            </div>
            <div style="margin-bottom:14px;">
                <label for="quantity" style="font-weight:500;">Quantity (kg)</label>
                <input type="number" id="quantity" name="quantity" min="0.01" step="0.01" required style="width:100%;padding:8px;border-radius:4px;border:1px solid #ddd;" oninput="updatePrice()">
            </div>
            <div id="totalPrice" style="margin: 10px 0; font-weight: 500; color: #333;"></div>
            <button type="button" class="menu-btn" style="width:100%;background:#4f8cff;">Process Sale (Demo)</button>
        </form>
    </div>
    <script>
    function updatePrice() {
        const riceSelect = document.getElementById('rice_type');
        const qtyInput = document.getElementById('quantity');
        const totalDiv = document.getElementById('totalPrice');
        const price = riceSelect.options[riceSelect.selectedIndex]?.getAttribute('data-price');
        const qty = parseFloat(qtyInput.value);
        if (price && qty > 0) {
            const total = (parseFloat(price) * qty).toFixed(2);
            totalDiv.innerHTML = `Total Price: <span style=\"color:#2563eb; font-weight:600;\">₱${total}</span>`;
        } else {
            totalDiv.innerHTML = '';
        }
    }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Expense - LMJ POS</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', Arial, sans-serif; background: #f8fafc; }
        .edit-container { max-width: 400px; margin: 60px auto; background: #fff; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 32px 24px; }
        h2 { color: #2d3a4b; margin-bottom: 18px; text-align:center; }
        .menu-btn { background: #4f8cff; color: #fff; border: none; border-radius: 6px; padding: 10px 24px; font-size: 1.1rem; font-weight: 500; cursor: pointer; margin-top: 12px; width:100%; }
        .menu-btn:hover { background: #2563eb; }
        input[type="text"], input[type="number"] { padding: 8px; border-radius: 4px; border: 1px solid #ddd; width: 100%; margin-bottom: 12px; }
    </style>
</head>
<body>
    <div class="edit-container">
        <h2>Edit Expense</h2>
        <form method="post">
            <label for="description">Description</label>
            <input type="text" id="description" name="description" value="{{ expense['description'] }}" required>
            <label for="amount">Amount (₱)</label>
            <input type="number" id="amount" name="amount" min="0.01" step="0.01" value="{{ expense['amount'] }}" required>
            <button type="submit" class="menu-btn">Save Changes</button>
        </form>
        <div style="margin-top:18px;text-align:center;">
            <a href="/financial" class="menu-btn" style="background:#888;">Cancel</a>
        </div>
    </div>
</body>
</html>
